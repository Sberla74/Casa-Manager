@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

Se non conosci la risposta a una domanda, rispondi con: "Non ho questa informazione, ma puoi chiedere direttamente a Fabrizio: <a href='https://wa.me/393490069083'>💬 WhatsApp</a>"
Rispondi in modo conciso. Includi sempre i link HTML cliccabili quando disponibili.`;

// ── LINGUE ────────────────────────────────────────────
const T = {
  it: {
    bannerText: "Ciao! Sono l'assistente virtuale di Casa Duna.",
    alertLink:  "⚠️ Prima di iniziare, clicca qui",
    afterAlert: "Perfetto, allora diamo inizio alla tua vacanza! 😊 Come posso aiutarti?",
    placeholder:"Scrivi un messaggio...",
    alertTitle: "⚠️ Due cose importanti",
    t1: "SABBIA", b1: "Ti chiediamo di sciacquare i piedi alle fontanelle esterne prima di entrare in doccia. La sabbia ostruisce gli scarichi e potrebbe causare disagi durante il soggiorno.",
    t2: "ENERGIA", b2: "Per evitare blackout, non utilizzare troppi elettrodomestici contemporaneamente (forno, aria condizionata, lavatrice, boiler acqua calda).",
    closeBtn: "Ho capito ✓"
  },
  en: {
    bannerText: "Hi! I'm Casa Duna's virtual assistant.",
    alertLink:  "⚠️ Important info before you start",
    afterAlert: "Perfect, let's start your holiday! 😊 How can I help you?",
    placeholder:"Type a message...",
    alertTitle: "⚠️ Two important things",
    t1: "SAND", b1: "Please rinse your feet at the outdoor taps before using the shower. Sand can block the drains and cause problems during your stay.",
    t2: "ENERGY", b2: "To avoid power cuts, please do not use too many appliances at the same time (oven, air conditioning, washing machine, water boiler).",
    closeBtn: "Got it ✓"
  }
};

let currentLang = 'it';
let bannerConfirmed = false;

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];

  // bottoni
  document.getElementById('btnIT').className = 'lang-btn' + (lang==='it'?' active':'');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');

  // banner
  if (!bannerConfirmed) {
    const b = document.getElementById('welcomeBanner');
    b.innerHTML = t.bannerText +
      '<br><span class="alert-link" onclick="openAlert()">' + t.alertLink + '</span>';
  }

  // placeholder
  document.getElementById('msgInput').placeholder = t.placeholder;
}

function openAlert() {
  const t = T[currentLang];
  document.getElementById('alertTitle').textContent = t.alertTitle;
  document.getElementById('alertT1').textContent = t.t1;
  document.getElementById('alertB1').textContent = t.b1;
  document.getElementById('alertT2').textContent = t.t2;
  document.getElementById('alertB2').textContent = t.b2;
  document.getElementById('alertCloseBtn').textContent = t.closeBtn;
  document.getElementById('alertOverlay').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('open');
  bannerConfirmed = true;
  document.getElementById('welcomeBanner').innerHTML = T[currentLang].afterAlert;
  document.getElementById('welcomeBanner').dataset.confirmed = '1';
}

// ── CHAT ──────────────────────────────────────────────
let chatHistory = [];

function mdToHtml(text) {
  return text
    .replace(/[*][*](.+?)[*][*]/g, '<strong>$1</strong>')
    .replace(/[*](.+?)[*]/g, '<em>$1</em>')
    .split('\n').join('<br>');
}

function nowStr() {
  return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, html) {
  const conv = document.getElementById('conversation');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = role==='bot' ? mdToHtml(html) : html;
  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = nowStr();
  wrap.appendChild(bub);
  wrap.appendChild(t);
  conv.appendChild(wrap);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}

function showTyping() {
  const conv = document.getElementById('conversation');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  conv.appendChild(d);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}
function hideTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const text = inp.value.trim();
  if (!text) return;

  // Nascondi banner al primo messaggio
  const banner = document.getElementById('welcomeBanner');
  if (banner) banner.style.display = 'none';

  inp.value = ''; btn.disabled = true;
  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  logFB('user', text);
  showTyping();

  try {
    const res = await fetch('https://trainer-ai-proxy.f-lonatica.workers.dev', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM + '\n\nRispondi SEMPRE in ' + (currentLang === 'it' ? 'italiano' : 'English') + '.',
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Mi dispiace, non sono riuscito a rispondere. Contatta Fabrizio su WhatsApp.';
    hideTyping();
    addMsg('bot', reply);
    chatHistory.push({role:'assistant', content:reply});
    logFB('assistant', reply);
  } catch(e) {
    hideTyping();
    addMsg('bot', 'Connessione non disponibile. Contatta Fabrizio: <a href="https://wa.me/393490069083">WhatsApp</a>');
  }
  btn.disabled = false;
  inp.focus();
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

// ── INIT ──────────────────────────────────────────────
setLang('it');
</script>
