.alert-link{color:#fbbf24;text-decoration:underline;cursor:pointer;font-weight:600}

/* ── POPUP ──────────────────────────────────────────── */
#alertOverlay{

  justify-content:center;

}
#alertOverlay.open{

}
.alert-box{

}
.alert-box h3{
  font-size:1.05rem;font-weight:600;
  text-align:center;margin-bottom:1rem;
}
.alert-row{
  display:flex;gap:0.65rem;
  padding:0.85rem 0.95rem;
  border-radius:0.9rem;
  margin-bottom:0.65rem;
}
.alert-row.sand{background:#fff5f5;}
.alert-row.energy{background:#fffbf0;margin-bottom:1.1rem;}
.alert-row .ico{font-size:1.3rem;flex-shrink:0;}
.alert-row p{font-size:0.85rem;line-height:1.5;color:#333;}
.alert-row p strong{display:block;margin-bottom:0.15rem;color:#1a1a1a;}
#alertCloseBtn{
  width:100%;
  background:#1e40af;
  color:#fff;
  border:none;
  border-radius:0.9rem;
  padding:0.75rem;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  transition:background 0.2s;
}
#alertCloseBtn:hover{background:#1e3a8a;}

/* ── CHAT AREA ──────────────────────────────────────────── */

.msg.user{flex-direction:row-reverse}

.msg.user .msg-avatar{background:linear-gradient(135deg,#10b981,#059669)}

    alertLink:  "⚠️ Prima di iniziare, clicca qui",
    afterAlert: "Perfetto, allora diamo inizio alla tua vacanza! 😊 Come posso aiutarti?",
    placeholder:"Scrivi un messaggio...",
    alertTitle: "⚠️ Due cose importanti",
    t1: "SABBIA", b1: "Ti chiediamo di sciacquare i piedi alla doccia esterna prima di entrare nei bagni interni. La sabbia ostruisce gli scarichi e potrebbe causare disagi durante il soggiorno.",
    t2: "ENERGIA", b2: "Per evitare blackout, non utilizzare troppi elettrodomestici contemporaneamente (forno, aria condizionata, lavatrice, boiler acqua calda).",
    closeBtn: "Ho capito ✓"
  },
  en: {
    bannerText: "Hi! I'm Fabrizio, your virtual assistant.",
    alertLink:  "⚠️ Important info before you start",
    afterAlert: "Perfect, let's start your holiday! 😊 How can I help you?",
    placeholder:"Type a message...",
    alertTitle: "⚠️ Two important things",
    t1: "SAND", b1: "Please rinse your feet at the outdoor shower before using indoor bathrooms. Sand can block the drains and cause problems during your stay.",
    t2: "ENERGY", b2: "To avoid power cuts, please do not use too many appliances at the same time (oven, air conditioning, washing machine, water boiler).",
    closeBtn: "Got it ✓"
  }
};

let currentLang = 'it';
let bannerConfirmed = false;

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];

  // bottoni
  document.getElementById('btnIT').className = 'lang-btn' + (lang==='it'?' active':'');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');

  // banner
  if (!bannerConfirmed) {
    const b = document.getElementById('welcomeBanner');
    b.innerHTML = t.bannerText +
      '<br><span class="alert-link" onclick="openAlert()">' + t.alertLink + '</span>';
  }

  // placeholder
  document.getElementById('msgInput').placeholder = t.placeholder;
}

function openAlert() {
  const t = T[currentLang];
  document.getElementById('alertTitle').textContent = t.alertTitle;
  document.getElementById('alertT1').textContent = t.t1;
  document.getElementById('alertB1').textContent = t.b1;
  document.getElementById('alertT2').textContent = t.t2;
  document.getElementById('alertB2').textContent = t.b2;
  document.getElementById('alertCloseBtn').textContent = t.closeBtn;
  document.getElementById('alertOverlay').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('open');
  bannerConfirmed = true;
  document.getElementById('welcomeBanner').innerHTML = T[currentLang].afterAlert;
  document.getElementById('welcomeBanner').dataset.confirmed = '1';
}

// ── CHAT ────────────────────────────────────────────
const conversationHistory = [];

function addBotMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="msg-avatar">F</div>
    <div class="msg-bubble">${text}</div>
  `;
  document.getElementById('conversation').appendChild(d);
  scrollToBottom();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `
    <div class="msg-bubble">${text}</div>
    <div class="msg-avatar">Tu</div>
  `;
  document.getElementById('conversation').appendChild(d);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById('conversation');
  c.scrollTop = c.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  addUserMsg(text);
  logFB('user', text);
  conversationHistory.push({role:'user', content:text});

  input.value = '';
  btn.disabled = true;

  try {
    const systemPrompt = currentLang === 'it' ? SYSTEM_PROMPT_IT : SYSTEM_PROMPT_EN;
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    if (!res.ok) throw new Error('Network error');

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Errore nella risposta';

    addBotMsg(reply);
    logFB('assistant', reply);
    conversationHistory.push({role:'assistant', content:reply});

  } catch (err) {
    addBotMsg('❌ Errore di connessione. Riprova tra poco.');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// ── INPUT HANDLING ────────────────────────────────────────────
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// ── INIT ────────────────────────────────────────────
setLang('it');
</script>
