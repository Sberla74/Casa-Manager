<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff — Calendario Entrate/Uscite</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D2B4E;--navy2:#1A4A7A;
  --gold:#C9973A;--gold2:#F0C060;
  --white:#FFF;--off:#F8FAFD;--bg:#EEF3FA;
  --text:#0D1F3C;--text2:#4A6080;--text3:#8AA0BC;
  --border:#D0DCF0;--radius:14px;
  --green:#16a34a;--green-bg:#dcfce7;
  --orange:#d97706;--orange-bg:#fef3c7;
  --red:#dc2626;--red-bg:#fee2e2;
  --shadow:0 2px 16px rgba(13,43,78,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}


/* TOPBAR */
.topbar{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#fff}
.topbar-logo span{color:var(--gold2)}
.topbar-casa{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}

/* MAIN */
.main{max-width:600px;margin:0 auto;padding:20px 16px}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.month-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .18s}
.month-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.month-label{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy)}

/* EVENTS */
.events-list{display:flex;flex-direction:column;gap:10px}
.event-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.event-card.checkin{border-left:4px solid var(--green)}
.event-card.checkout{border-left:4px solid var(--orange)}
.event-card.cambio{border-left:4px solid var(--red)}
.event-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.event-date{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--navy);line-height:1}
.event-day{font-size:11px;color:var(--text3);margin-top:2px}
.event-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.badge-ci{background:var(--green-bg);color:var(--green)}
.badge-co{background:var(--orange-bg);color:var(--orange)}
.badge-cambio{background:var(--red-bg);color:var(--red)}
.event-body{padding:0 16px 14px}
.event-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;border-bottom:1px solid var(--off)}
.event-row:last-child{border-bottom:none}
.event-lbl{color:var(--text3);width:90px;flex-shrink:0;font-size:12px}
.event-val{color:var(--text);font-weight:500}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* LEGEND */
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* ORE PANEL */
.ore-panel{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.ore-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ore-hdr-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--navy)}
.ore-toggle{font-size:11px;color:var(--text3);padding:4px 10px;border:1px solid var(--border);border-radius:7px;background:var(--off);cursor:pointer;font-family:'DM Sans',sans-serif}
.ore-body{padding:14px 16px}
.ore-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.ore-fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:4px}
.ore-fg input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--off);outline:none;box-sizing:border-box}
.ore-fg input:focus{border-color:var(--navy2);background:var(--white)}
.ore-calc{font-size:14px;color:var(--navy);font-weight:600;margin-bottom:12px;padding:8px 12px;background:var(--off);border-radius:8px;min-height:36px}
.ore-save{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ore-save:hover{opacity:.88}
.ore-save:disabled{opacity:.5;cursor:not-allowed}
.ore-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.ore-entry{display:flex;align-items:center;justify-content:space-between;padding:9px 2px;border-bottom:1px solid var(--off)}
.ore-entry:last-child{border-bottom:none}
.ore-entry-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ore-entry-date{font-weight:600;color:var(--navy);font-size:13px}
.ore-entry-time{color:var(--text3);font-size:12px}
.ore-entry-hrs{background:var(--navy2);color:#fff;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.ore-del{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--off);cursor:pointer;font-size:12px;color:var(--text3);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ore-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.ore-empty-msg{text-align:center;padding:14px;color:var(--text3);font-size:12px}
</style>
</head>
<body>


<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-logo">📅 Calendario <span>Entrate/Uscite</span></div>
    <div class="topbar-casa" id="topbarCasa"></div>
  </div>
  <button onclick="reload()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">↻ Aggiorna</button>
</div>

<div class="main">
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Check-in</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Check-out</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Cambio</div>
  </div>

  <!-- ORE STAFF -->
  <div class="ore-panel">
    <div class="ore-hdr">
      <div class="ore-hdr-title">⏱ Registra le tue ore</div>
      <button class="ore-toggle" onclick="toggleOrePanel()">▲ Chiudi</button>
    </div>
    <div class="ore-body" id="oreBody">
      <div class="ore-row3">
        <div class="ore-fg">
          <label>Data</label>
          <input id="oreData" type="date">
        </div>
        <div class="ore-fg">
          <label>Arrivo</label>
          <input id="oreArrivo" type="time" oninput="updateOreCalc()">
        </div>
        <div class="ore-fg">
          <label>Uscita</label>
          <input id="oreUscita" type="time" oninput="updateOreCalc()">
        </div>
      </div>
      <div class="ore-calc" id="oreCalc">Ore lavorate: —</div>
      <button class="ore-save" onclick="saveOre()">✓ Registra</button>
      <hr class="ore-divider">
      <div id="oreList"><div class="ore-empty-msg">Nessuna registrazione questo mese</div></div>
    </div>
  </div>

  <div id="eventsList"><div class="loading">Caricamento...</div></div>
</div>

<script>
// ── CONFIG ──
var FB_URL = 'https://casa-manager-24414-default-rtdb.europe-west1.firebasedatabase.app';

// Staff group: Donnamisurata, Villa Gió, Terrazza sul mare
var STAFF_ROOMS = [
  {id:1, name:'Bartolomeo',  emoji:'🛏'},
  {id:2, name:'Ignazio',     emoji:'🛏'},
  {id:3, name:'Rosario',     emoji:'🛏'},
  {id:4, name:'Guglielmo',   emoji:'🛏'},
  {id:5, name:'Guglielmino', emoji:'🛏'},
  {id:6, name:'Carmine',     emoji:'🛏'},
];
var STAFF_HOUSES = [];



// ── FIREBASE AUTH (Anonymous) ──
var FB_TOKEN_KEY = 'cm_fb_token';
var FIREBASE_WEB_API_KEY = 'AIzaSyC5u2VAYDuPIdOXlSXFMS6ozTOglc7cA-g';

function getFbToken() {
  try {
    var t = JSON.parse(localStorage.getItem(FB_TOKEN_KEY)||'null');
    if (t && t.token && Date.now() < t.expires) return t.token;
  } catch(e) {}
  return null;
}
function saveFbToken(token, expiresIn) {
  localStorage.setItem(FB_TOKEN_KEY, JSON.stringify({
    token: token,
    expires: Date.now() + (parseInt(expiresIn||3600) - 60) * 1000
  }));
}
function signInAnonymous(cb) {
  var existing = getFbToken();
  if (existing) { if(cb) cb(existing); return; }
  fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + FIREBASE_WEB_API_KEY, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({returnSecureToken: true})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.idToken) { saveFbToken(d.idToken, d.expiresIn); if(cb) cb(d.idToken); }
    else { console.warn('Firebase Auth error:', d); if(cb) cb(null); }
  })
  .catch(function(e){ console.warn('Firebase Auth error:', e); if(cb) cb(null); });
}
function fbFetch(url, options) {
  var token = getFbToken();
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  var authUrl = token ? url + sep + 'auth=' + token : url;
  return fetch(authUrl, options);
}
// ── DATA ──
var curY = new Date().getFullYear();
var curM = new Date().getMonth();
var allBookings = [];

function loadBookings() {
  document.getElementById('eventsList').innerHTML = '<div class="loading">Caricamento...</div>';
  fbFetch(FB_URL + '/manual_bookings.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      allBookings = [];
      if(!data) { renderEvents(); return; }
      STAFF_ROOMS.forEach(function(r){
        (data['r'+r.id]||[]).forEach(function(b){
          b._prop = r.emoji + ' Camera ' + r.name;
          allBookings.push(b);
        });
      });
      renderEvents();
    })
    .catch(function(){
      document.getElementById('eventsList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Errore caricamento dati</div>';
    });
}

function reload() { loadBookings(); }

// ── RENDER ──
var MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var DAYS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

function pad(n){ return String(n).padStart(2,'0'); }
function dateStr(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function fmtDate(s){ if(!s)return'—'; var p=s.split('-'); return p[2]+'/'+p[1]; }
function dayOfWeek(s){ return DAYS[new Date(s+'T12:00:00').getDay()]; }
function nights(a,b){ return Math.max(0,Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/864e5)); }

function changeMonth(d){
  curM += d;
  if(curM > 11){ curM=0; curY++; }
  if(curM < 0) { curM=11; curY--; }
  renderEvents();
  loadOre();
}

function renderEvents() {
  document.getElementById('monthLabel').textContent = MONTHS[curM] + ' ' + curY;
  var ms = dateStr(curY, curM, 1);
  var me = dateStr(curY, curM, new Date(curY, curM+1, 0).getDate());

  // Build events: check-in on from date, checkout on to date
  var events = [];
  allBookings.forEach(function(b){
    if(!b.from || !b.to) return;
    var isCI = b.from >= ms && b.from <= me;
    var isCO = b.to > ms && b.to <= me;

    // Same day = cambio (checkout + checkin)
    if(isCI && isCO && b.from === b.to) return;

    if(isCI) events.push({date:b.from, type:'checkin', b:b});
    if(isCO) events.push({date:b.to,   type:'checkout', b:b});
  });

  // Detect cambio: same date has both checkout and checkin
  var byDate = {};
  events.forEach(function(e){
    if(!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  // Build final event list
  var finalEvents = [];
  Object.keys(byDate).sort().forEach(function(date){
    var evs = byDate[date];
    var hasCI = evs.some(function(e){return e.type==='checkin';});
    var hasCO = evs.some(function(e){return e.type==='checkout';});
    if(hasCI && hasCO) {
      // Cambio — merge
      var ciEvs = evs.filter(function(e){return e.type==='checkin';});
      var coEvs = evs.filter(function(e){return e.type==='checkout';});
      finalEvents.push({date:date, type:'cambio', ciList:ciEvs, coList:coEvs});
    } else {
      evs.forEach(function(e){ finalEvents.push({date:date, type:e.type, ciList:[e], coList:[e], b:e.b}); });
    }
  });

  var el = document.getElementById('eventsList');
  if(!finalEvents.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🌴</div>Nessun turno questo mese</div>';
    return;
  }

  el.innerHTML = finalEvents.map(function(ev){
    var day = parseInt(ev.date.split('-')[2]);
    var dow = dayOfWeek(ev.date);
    var badgeHtml, bodyHtml, cardCls;

    if(ev.type === 'checkin') {
      var b = ev.b;
      var n = nights(b.from, b.to);
      cardCls = 'checkin';
      badgeHtml = '<span class="event-badge badge-ci">✓ Check-in</span>';
      bodyHtml =
        row('Ospite', b.guest||'Prenotazione') +
        row('Struttura', b._prop||'—') +
        row('Check-out', fmtDate(b.to) + ' (' + n + ' notti)') +
        row('Ospiti', (b.numGuests||1) + ' person'+(b.numGuests===1?'a':'e')) +
        (b.notes ? row('Note', b.notes) : '');
    } else if(ev.type === 'checkout') {
      var b = ev.b;
      cardCls = 'checkout';
      badgeHtml = '<span class="event-badge badge-co">→ Check-out</span>';
      bodyHtml =
        row('Ospite', b.guest||'Prenotazione') +
        row('Struttura', b._prop||'—') +
        row('Check-in era', fmtDate(b.from)) +
        row('Ospiti', (b.numGuests||1) + ' person'+(b.numGuests===1?'a':'e')) +
        (b.notes ? row('Note', b.notes) : '');
    } else {
      // Cambio
      cardCls = 'cambio';
      badgeHtml = '<span class="event-badge badge-cambio">↔ Cambio</span>';
      var coLines = ev.coList.map(function(e){
        return '<div style="padding:4px 0;border-bottom:1px solid var(--off)"><span style="color:var(--text3);font-size:12px">Uscita: </span><span style="font-weight:500">'+(e.b.guest||'Prenotazione')+'</span> <span style="font-size:12px;color:var(--text3)">'+(e.b._prop||'')+'</span></div>';
      }).join('');
      var ciLines = ev.ciList.map(function(e){
        var n=nights(e.b.from,e.b.to);
        return '<div style="padding:4px 0;border-bottom:1px solid var(--off)"><span style="color:var(--text3);font-size:12px">Entrata: </span><span style="font-weight:500">'+(e.b.guest||'Prenotazione')+'</span> <span style="font-size:12px;color:var(--text3)">'+(e.b._prop||'')+' · '+(e.b.numGuests||1)+'p · '+n+'n'+(e.b.notes?' · '+e.b.notes:'')+'</span></div>';
      }).join('');
      bodyHtml = '<div style="font-size:12px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">In uscita</div>'+coLines+
                 '<div style="font-size:12px;color:var(--text3);margin:8px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">In entrata</div>'+ciLines;
    }

    return '<div class="event-card '+cardCls+'">'+
      '<div class="event-hdr">'+
        '<div><div class="event-date">'+pad(day)+'</div><div class="event-day">'+dow+' '+MONTHS[curM].slice(0,3)+'</div></div>'+
        badgeHtml+
      '</div>'+
      '<div class="event-body">'+bodyHtml+'</div>'+
    '</div>';
  }).join('');
}

function row(lbl, val) {
  return '<div class="event-row"><span class="event-lbl">'+lbl+'</span><span class="event-val">'+val+'</span></div>';
}

// ── ORE STAFF ──
var oreEntries = [];
var orePanelOpen = true;

function toggleOrePanel(){
  orePanelOpen = !orePanelOpen;
  document.getElementById('oreBody').style.display = orePanelOpen ? 'block' : 'none';
  document.querySelector('.ore-toggle').textContent = orePanelOpen ? '▲ Chiudi' : '▼ Apri';
}

function calcOre(arrivo, uscita){
  if(!arrivo||!uscita) return 0;
  var ap=arrivo.split(':'), up=uscita.split(':');
  var mins=(parseInt(up[0])*60+parseInt(up[1]))-(parseInt(ap[0])*60+parseInt(ap[1]));
  return mins>0 ? Math.round(mins*10/60)/10 : 0;
}

function fmtOre(ore){
  var h=Math.floor(ore), m=Math.round((ore-h)*60);
  return h>0 ? h+'h'+(m>0?' '+String(m).padStart(2,'0')+'m':'') : m+'m';
}

function updateOreCalc(){
  var ore=calcOre(document.getElementById('oreArrivo').value, document.getElementById('oreUscita').value);
  document.getElementById('oreCalc').textContent = ore>0 ? 'Ore lavorate: '+fmtOre(ore) : 'Ore lavorate: —';
}

function loadOre(){
  var monthKey = curY+'-'+pad(curM+1);
  fbFetch(FB_URL+'/staff_hours/san_bartolomeo/'+monthKey+'.json')
    .then(function(r){return r.json();})
    .then(function(data){
      oreEntries=[];
      if(data && typeof data==='object'){
        Object.keys(data).forEach(function(k){ var e=data[k]; e._key=k; oreEntries.push(e); });
        oreEntries.sort(function(a,b){return String(b.data).localeCompare(String(a.data));});
      }
      renderOre();
    })
    .catch(function(){ renderOre(); });
}

function renderOre(){
  var el=document.getElementById('oreList');
  if(!oreEntries.length){ el.innerHTML='<div class="ore-empty-msg">Nessuna registrazione questo mese</div>'; return; }
  el.innerHTML=oreEntries.map(function(e){
    var dp=e.data?e.data.split('-'):[];
    var dateDisp=dp.length===3?dp[2]+'/'+dp[1]:'—';
    return '<div class="ore-entry">'+
      '<div class="ore-entry-left">'+
        '<span class="ore-entry-date">'+dateDisp+'</span>'+
        '<span class="ore-entry-time">'+(e.arrivo||'—')+' → '+(e.uscita||'—')+'</span>'+
        '<span class="ore-entry-hrs">'+fmtOre(e.ore||0)+'</span>'+
      '</div>'+
      '<button class="ore-del" data-key="'+e._key+'" onclick="deleteOre(this)">✕</button>'+
    '</div>';
  }).join('');
}

function saveOre(){
  var data=document.getElementById('oreData').value;
  var arrivo=document.getElementById('oreArrivo').value;
  var uscita=document.getElementById('oreUscita').value;
  var ore=calcOre(arrivo,uscita);
  if(!data){alert('Inserisci la data');return;}
  if(!arrivo||!uscita){alert('Inserisci arrivo e uscita');return;}
  if(ore<=0){alert('Orario uscita deve essere dopo arrivo');return;}
  var monthKey=data.substring(0,7);
  var entry={data:data,arrivo:arrivo,uscita:uscita,ore:ore,ts:Date.now()};
  var btn=document.querySelector('.ore-save');
  btn.textContent='⏳ Salvataggio...'; btn.disabled=true;
  fbFetch(FB_URL+'/staff_hours/san_bartolomeo/'+monthKey+'.json',{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.name){
      document.getElementById('oreArrivo').value='';
      document.getElementById('oreUscita').value='';
      document.getElementById('oreCalc').textContent='Ore lavorate: —';
      if(monthKey===curY+'-'+pad(curM+1)) loadOre();
    }
  })
  .catch(function(){alert('Errore di salvataggio');})
  .finally(function(){btn.textContent='✓ Registra';btn.disabled=false;});
}

function deleteOre(btn){
  if(!confirm('Eliminare questa registrazione?'))return;
  var key=btn.dataset.key;
  var monthKey=curY+'-'+pad(curM+1);
  fbFetch(FB_URL+'/staff_hours/san_bartolomeo/'+monthKey+'/'+key+'.json',{method:'DELETE'})
    .then(function(){loadOre();})
    .catch(function(){alert('Errore eliminazione');});
}

// ── INIT ──
signInAnonymous(function(){
  document.getElementById('oreData').value = new Date().toISOString().split('T')[0];
  loadBookings();
  loadOre();
});
</script>
</body>
</html>
