<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D2B4E;--navy2:#1A4A7A;--navy3:#2B6CB0;
  --gold:#C9973A;--gold2:#F0C060;
  --white:#FFFFFF;--off:#F8FAFD;--bg:#EEF3FA;
  --text:#0D1F3C;--text2:#4A6080;--text3:#8AA0BC;
  --border:#D0DCF0;--radius:14px;
  --shadow:0 2px 16px rgba(13,43,78,.08);
  --shadow-md:0 4px 24px rgba(13,43,78,.12);
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --orange:#d97706;--orange-bg:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,43,78,.3)}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff}
.topbar-logo span{color:var(--gold2)}
.topbar-right{display:flex;align-items:center;gap:14px}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#6b7280;transition:background .3s}
.sync-dot.connected{background:#16a34a}
.user-badge{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px;max-width:1160px;margin:0 auto;padding:24px 20px}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--navy);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy)}

/* PROP CARDS */
.prop-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.prop-card:hover{box-shadow:var(--shadow-md)}
.prop-header{display:flex;align-items:center;padding:16px 18px;gap:14px;cursor:pointer;user-select:none}
.prop-emoji{font-size:26px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--off);border-radius:12px;border:1px solid var(--border);flex-shrink:0}
.prop-info{flex:1;min-width:0}
.prop-name{font-weight:600;font-size:15px;color:var(--navy);margin-bottom:1px}
.prop-addr{font-size:12px;color:var(--text3)}
.prop-badges{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-gray{background:var(--off);color:var(--text2);border:1px solid var(--border)}
.prop-toggle{color:var(--text3);font-size:18px;flex-shrink:0;transition:transform .2s}
.prop-toggle.open{transform:rotate(180deg)}

/* PROP DETAILS */
.prop-details{display:none;border-top:1px solid var(--border);padding:14px 18px}
.prop-details.open{display:block}
.booking-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:9px;margin-bottom:6px;background:var(--off);font-size:13px}
.booking-row:last-child{margin-bottom:0}
.booking-dates{color:var(--text2);font-size:12px}
.booking-guest{font-weight:500;color:var(--navy)}
.booking-source{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.src-airbnb{background:#FF5A5F22;color:#d93025}
.src-booking{background:#003B9522;color:#003B95}
.src-manuale{background:#16a34a22;color:#16a34a}
.empty-state{text-align:center;padding:20px;color:var(--text3);font-size:13px}

/* HOTEL */
.hotel-section{margin-top:28px}
.hotel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.hotel-grid{grid-template-columns:repeat(2,1fr)}}
.room-card{background:var(--white);border-radius:12px;border:1.5px solid var(--border);padding:14px;transition:all .18s;cursor:default}
.room-card:hover{box-shadow:var(--shadow-md)}
.room-card.occupied{border-color:#fca5a5;background:#fff8f8}
.room-card.checkin{border-color:#86efac;background:#f0fdf4}
.room-name{font-weight:600;font-size:13px;color:var(--navy);margin-bottom:3px}
.room-type{font-size:11px;color:var(--text3);margin-bottom:8px}
.room-status{font-size:11px;font-weight:700}
.room-status.free{color:var(--green)}
.room-status.occ{color:var(--red)}
.room-status.ci{color:var(--orange)}
.room-guest{font-size:11px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SIDEBAR */
.sidebar-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.sidebar-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--navy2)}
.sidebar-body{padding:14px 16px}

/* OCCUPANCY */
.occ-row{margin-bottom:10px}
.occ-row:last-child{margin-bottom:0}
.occ-label-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.occ-name{color:var(--text2);font-weight:500}
.occ-pct{color:var(--navy);font-weight:700}
.occ-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.occ-fill{height:100%;border-radius:3px;transition:width .5s}
.occ-fill.high{background:var(--green)}
.occ-fill.mid{background:var(--gold)}
.occ-fill.low{background:var(--text3)}

/* CALENDAR */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--off);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;transition:all .18s}
.cal-nav:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.cal-month{font-weight:600;font-size:13px;color:var(--navy)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dn{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text3);text-align:center;padding:2px 0}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;color:var(--text2)}
.cal-d.today{background:var(--navy);color:#fff;font-weight:700}
.cal-d.occ{background:#fee2e2;color:var(--red)}
.cal-d.other{opacity:.25}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,43,78,.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(13,43,78,.2);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--navy2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--off);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--navy3);background:var(--white)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--off);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}

/* BOOKING ROW ACTIONS */
.booking-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;margin-bottom:6px;background:var(--off);font-size:13px}
.booking-row:last-child{margin-bottom:0}
.booking-dates{color:var(--text2);font-size:12px;min-width:100px}
.booking-guest{font-weight:500;color:var(--navy);flex:1}
.booking-source{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;flex-shrink:0}
.src-airbnb{background:#FF5A5F22;color:#d93025}
.src-booking{background:#003B9522;color:#003B95}
.src-manuale{background:#16a34a22;color:#16a34a}
.booking-actions{display:flex;gap:4px;flex-shrink:0}
.bk-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.bk-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.bk-btn.del:hover{background:var(--red);border-color:var(--red)}

/* ADD BUTTON */
.prop-add-btn{padding:6px 14px;border-radius:9px;border:1.5px dashed var(--border);background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;margin-top:8px}
.prop-add-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--off)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">🏠 Casa <span>Manager</span></div>
  <div class="topbar-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">—</span>
    </div>
    <div class="user-badge">F</div>
  </div>
</div>

<div class="layout">

  <!-- MAIN -->
  <div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Strutture</div>
        <div class="stat-value" id="statTotal">10</div>
        <div class="stat-sub">unità totali</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Occupate oggi</div>
        <div class="stat-value" style="color:var(--red)" id="statOcc">0</div>
        <div class="stat-sub">in questo momento</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Check-in oggi</div>
        <div class="stat-value" style="color:var(--orange)" id="statCi">0</div>
        <div class="stat-sub">arrivi previsti</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Libere oggi</div>
        <div class="stat-value" style="color:var(--green)" id="statFree">10</div>
        <div class="stat-sub">disponibili</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Le mie case</div>
    </div>
    <div id="houseList"></div>

    <div class="hotel-section">
      <div class="section-header">
        <div class="section-title">🏨 Hotel San Bart</div>
      </div>
      <div class="hotel-grid" id="hotelGrid"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div>
    <div class="sidebar-card">
      <div class="sidebar-header">
        <div class="sidebar-title">📊 Occupazione 30 giorni</div>
      </div>
      <div class="sidebar-body" id="occBars"></div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-header">
        <div class="sidebar-title">📅 Calendario</div>
      </div>
      <div class="sidebar-body">
        <div class="cal-nav-row">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month" id="calLabel"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── HELPERS ──
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function localDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(s){if(!s)return'—';var p=s.split('-');return p[2]+'/'+p[1]}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2800)}

// ── DATA ──
var HOUSES = [
  {id:1, name:'Terrazza sul mare', addr:'Donnalucata',              emoji:'🌅', bookings:[]},
  {id:2, name:'Villa Gió',         addr:'Sampieri',                 emoji:'🌺', bookings:[]},
  {id:3, name:'Donnamisurata',     addr:'Sampieri',                 emoji:'🏡', bookings:[]},
  {id:4, name:'Casa Duna',         addr:'Via Arezzo 64, Donnalucata',emoji:'🌊', bookings:[]}
];

var HOTEL = {
  rooms:[
    {id:1, name:'Bartolomeo',  type:'Matrimoniale', bookings:[]},
    {id:2, name:'Ignazio',     type:'Matrimoniale', bookings:[]},
    {id:3, name:'Rosario',     type:'Matrimoniale', bookings:[]},
    {id:4, name:'Guglielmo',   type:'Matrimoniale', bookings:[]},
    {id:5, name:'Guglielmino', type:'Matrimoniale', bookings:[]},
    {id:6, name:'Carmine',     type:'Matrimoniale', bookings:[]}
  ]
};

// ── STATUS ──
function houseStatus(h){
  var td=todayStr();
  for(var i=0;i<h.bookings.length;i++){
    var b=h.bookings[i];
    if(b.from<=td&&b.to>td) return {s:'occupied',b:b};
    if(b.from===td) return {s:'checkin',b:b};
  }
  return {s:'free',b:null};
}

function nextBooking(h){
  var td=todayStr(),next=null;
  h.bookings.forEach(function(b){if(b.from>td&&(!next||b.from<next.from))next=b;});
  return next;
}

function occPct(bookings,days){
  var td=todayStr(),occ=0;
  for(var d=0;d<days;d++){
    var dd=new Date(td+'T12:00:00');dd.setDate(dd.getDate()+d);
    var ds=localDate(dd);
    if(bookings.some(function(b){return b.from<=ds&&b.to>ds}))occ++;
  }
  return Math.round(occ/days*100);
}

// ── RENDER HOUSES ──
function renderHouses(){
  var td=todayStr();
  var list=document.getElementById('houseList');
  var totalOcc=0,totalCi=0;

  list.innerHTML=HOUSES.map(function(h){
    var st=houseStatus(h);
    var nx=nextBooking(h);
    if(st.s==='occupied')totalOcc++;
    if(st.s==='checkin'){totalOcc++;totalCi++;}

    var badge='';
    if(st.s==='occupied'){
      badge='<span class="badge badge-red">🔴 Occupata</span>';
      if(st.b&&st.b.guest)badge+='<span class="badge badge-gray">'+st.b.guest+'</span>';
    }else if(st.s==='checkin'){
      badge='<span class="badge badge-orange">🔑 Check-in oggi</span>';
      if(st.b&&st.b.guest)badge+='<span class="badge badge-gray">'+st.b.guest+'</span>';
    }else{
      badge='<span class="badge badge-green">✓ Libera</span>';
      if(nx)badge+='<span class="badge badge-gray">Prossimo: '+fmt(nx.from)+'</span>';
    }

    // Bookings list
    var future=h.bookings.filter(function(b){return b.to>=td}).sort(function(a,b){return a.from.localeCompare(b.from)});
    var detailsHtml=future.length?future.map(function(b){
      var srcCls='src-'+(b.source||'manuale');
      var srcLabel=b.source==='airbnb'?'Airbnb':b.source==='booking'?'Booking':'Manuale';
      var isCurr=b.from<=td&&b.to>td;
      var canEdit=b.source==='manuale'||!b.source;
      var actHtml=canEdit?'<div class="booking-actions"><button class="bk-btn" onclick="editBooking('+h.id+',\''+b.id+'\')">✏️</button><button class="bk-btn del" onclick="confirmDelete('+h.id+',\''+b.id+'\')">✕</button></div>':'';
      return '<div class="booking-row">'+(isCurr?'<span>🏠</span>':'')+'<span class="booking-dates">'+fmt(b.from)+' → '+fmt(b.to)+'</span><span class="booking-guest">'+(b.guest||'Prenotazione')+'</span><span class="booking-source '+srcCls+'">'+srcLabel+'</span>'+actHtml+'</div>';
    }).join(''):'<div class="empty-state">Nessuna prenotazione</div>';
    detailsHtml+='<button class="prop-add-btn" onclick="openAddBooking('+h.id+')">+ Aggiungi prenotazione</button>';

    return '<div class="prop-card">'+
      '<div class="prop-header" onclick="toggleProp('+h.id+')">'+
        '<div class="prop-emoji">'+h.emoji+'</div>'+
        '<div class="prop-info">'+
          '<div class="prop-name">'+h.name+'</div>'+
          '<div class="prop-addr">'+h.addr+'</div>'+
          '<div class="prop-badges">'+badge+'</div>'+
        '</div>'+
        '<span class="prop-toggle" id="toggle-'+h.id+'">⌄</span>'+
      '</div>'+
      '<div class="prop-details" id="details-'+h.id+'">'+detailsHtml+'</div>'+
    '</div>';
  }).join('');

  // Hotel stats
  HOTEL.rooms.forEach(function(r){
    var rs=houseStatus(r);
    if(rs.s==='occupied')totalOcc++;
    if(rs.s==='checkin'){totalOcc++;totalCi++;}
  });

  var total=HOUSES.length+HOTEL.rooms.length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statOcc').textContent=totalOcc;
  document.getElementById('statCi').textContent=totalCi;
  document.getElementById('statFree').textContent=total-totalOcc;
}

function toggleProp(id){
  var el=document.getElementById('details-'+id);
  var tog=document.getElementById('toggle-'+id);
  if(el){el.classList.toggle('open');if(tog)tog.classList.toggle('open');}
}

// ── RENDER HOTEL ──
function renderHotel(){
  var grid=document.getElementById('hotelGrid');
  grid.innerHTML=HOTEL.rooms.map(function(r){
    var rs=houseStatus(r);
    var cls=rs.s==='occupied'?'occupied':rs.s==='checkin'?'checkin':'';
    var stLabel=rs.s==='occupied'?'Occupata':rs.s==='checkin'?'Check-in oggi':'Libera';
    var stCls=rs.s==='free'?'free':rs.s==='checkin'?'ci':'occ';
    return '<div class="room-card '+cls+'">'+
      '<div class="room-name">'+r.name+'</div>'+
      '<div class="room-type">'+r.type+'</div>'+
      '<div class="room-status '+stCls+'">'+stLabel+'</div>'+
      (rs.b?'<div class="room-guest">'+(rs.b.guest||'Prenotazione')+'</div>':'')+
    '</div>';
  }).join('');
}

// ── RENDER OCC BARS ──
function renderOcc(){
  var bars=document.getElementById('occBars');
  var items=HOUSES.map(function(h){return{name:h.emoji+' '+h.name,pct:occPct(h.bookings,30)};});
  var hotelPct=Math.round(HOTEL.rooms.reduce(function(s,r){return s+occPct(r.bookings,30);},0)/HOTEL.rooms.length);
  items.push({name:'🏨 San Bart',pct:hotelPct});

  bars.innerHTML=items.map(function(item){
    var fc=item.pct>=70?'high':item.pct>=30?'mid':'low';
    return '<div class="occ-row">'+
      '<div class="occ-label-row"><span class="occ-name">'+item.name+'</span><span class="occ-pct">'+item.pct+'%</span></div>'+
      '<div class="occ-bar"><div class="occ-fill '+fc+'" style="width:'+item.pct+'%"></div></div>'+
    '</div>';
  }).join('');
}

// ── MINI CALENDAR ──
var calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function renderCal(){
  var months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  document.getElementById('calLabel').textContent=months[calMonth]+' '+calYear;
  var td=todayStr();
  var occ={};
  HOUSES.forEach(function(h){h.bookings.forEach(function(b){
    var d=new Date(b.from+'T12:00:00'),end=new Date(b.to+'T12:00:00');
    while(d<end){occ[localDate(d)]=true;d.setDate(d.getDate()+1);}
  });});

  var first=(new Date(calYear,calMonth,1).getDay()+6)%7;
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var html=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(function(d){return'<div class="cal-dn">'+d+'</div>';}).join('');
  for(var i=0;i<first;i++)html+='<div class="cal-d other"></div>';
  for(var day=1;day<=daysInMonth;day++){
    var ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var cls='cal-d'+(ds===td?' today':occ[ds]?' occ':'');
    html+='<div class="'+cls+'">'+day+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}

// ── RENDER ALL ──
function renderAll(){
  renderHouses();
  renderHotel();
  renderOcc();
  renderCal();
}

// ── STORAGE ──
var STORAGE_KEY = 'cm_bookings_v1';

function loadBookings() {
  var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  HOUSES.forEach(function(h) {
    h.bookings = (data['h'+h.id] || []);
  });
  HOTEL.rooms.forEach(function(r) {
    r.bookings = (data['r'+r.id] || []);
  });
}

function saveBookings() {
  var data = {};
  HOUSES.forEach(function(h) {
    // Only save manual bookings - platform ones come from Firebase
    data['h'+h.id] = h.bookings.filter(function(b){ return !b.source || b.source === 'manuale'; });
  });
  HOTEL.rooms.forEach(function(r) {
    data['r'+r.id] = r.bookings.filter(function(b){ return !b.source || b.source === 'manuale'; });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── MODAL ──
function openAddBooking(houseId) {
  document.getElementById('modalTitle').textContent = 'Nuova prenotazione';
  document.getElementById('modalHouseId').value = houseId;
  document.getElementById('modalBookingId').value = '';
  document.getElementById('bkGuest').value = '';
  document.getElementById('bkFrom').value = '';
  document.getElementById('bkTo').value = '';
  document.getElementById('bkNotes').value = '';
  document.getElementById('btnDeleteBk').style.display = 'none';
  document.getElementById('bookingModal').classList.add('open');
  setTimeout(function(){ document.getElementById('bkGuest').focus(); }, 100);
}

function editBooking(houseId, bookingId) {
  var h = HOUSES.find(function(x){ return x.id === houseId; });
  if (!h) return;
  var b = h.bookings.find(function(x){ return String(x.id) === String(bookingId); });
  if (!b) return;
  document.getElementById('modalTitle').textContent = 'Modifica prenotazione';
  document.getElementById('modalHouseId').value = houseId;
  document.getElementById('modalBookingId').value = bookingId;
  document.getElementById('bkGuest').value = b.guest || '';
  document.getElementById('bkFrom').value = b.from || '';
  document.getElementById('bkTo').value = b.to || '';
  document.getElementById('bkNotes').value = b.notes || '';
  document.getElementById('btnDeleteBk').style.display = 'inline-flex';
  document.getElementById('bookingModal').classList.add('open');
}

function closeModal() {
  document.getElementById('bookingModal').classList.remove('open');
}

function saveBooking() {
  var houseId = parseInt(document.getElementById('modalHouseId').value);
  var bookingId = document.getElementById('modalBookingId').value;
  var guest = document.getElementById('bkGuest').value.trim();
  var from  = document.getElementById('bkFrom').value;
  var to    = document.getElementById('bkTo').value;
  var notes = document.getElementById('bkNotes').value.trim();

  if (!from || !to) { toast('Inserisci le date di check-in e check-out'); return; }
  if (from >= to) { toast('Il check-out deve essere dopo il check-in'); return; }

  var h = HOUSES.find(function(x){ return x.id === houseId; });
  if (!h) return;

  if (bookingId) {
    // Edit existing
    var b = h.bookings.find(function(x){ return String(x.id) === String(bookingId); });
    if (b) { b.guest = guest; b.from = from; b.to = to; b.notes = notes; }
  } else {
    // New booking
    var nights = Math.round((new Date(to+'T12:00:00') - new Date(from+'T12:00:00')) / (1000*60*60*24));
    h.bookings.push({
      id: Date.now(),
      guest: guest || 'Prenotazione',
      from: from,
      to: to,
      nights: nights,
      notes: notes,
      source: 'manuale'
    });
  }

  saveBookings();
  closeModal();
  renderAll();
  toast('✓ Prenotazione salvata');
}

function confirmDelete(houseId, bookingId) {
  document.getElementById('modalHouseId').value = houseId;
  document.getElementById('modalBookingId').value = bookingId;
  deleteBooking();
}

function deleteBooking() {
  var houseId = parseInt(document.getElementById('modalHouseId').value);
  var bookingId = document.getElementById('modalBookingId').value;
  if (!confirm('Eliminare questa prenotazione?')) return;
  var h = HOUSES.find(function(x){ return x.id === houseId; });
  if (!h) return;
  h.bookings = h.bookings.filter(function(b){ return String(b.id) !== String(bookingId); });
  saveBookings();
  closeModal();
  renderAll();
  toast('Prenotazione eliminata');
}

// ── INIT ──
loadBookings();
renderAll();

// Close modal on overlay click (after DOM ready)
document.getElementById('bookingModal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
</script>
<!-- BOOKING MODAL -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Nuova prenotazione</div>
    <input type="hidden" id="modalHouseId">
    <input type="hidden" id="modalBookingId">
    <div class="form-group">
      <label class="form-label">Nome ospite</label>
      <input class="form-input" id="bkGuest" type="text" placeholder="es. Mario Rossi">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Check-in <span style="color:var(--red)">*</span></label>
        <input class="form-input" id="bkFrom" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Check-out <span style="color:var(--red)">*</span></label>
        <input class="form-input" id="bkTo" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note</label>
      <input class="form-input" id="bkNotes" type="text" placeholder="es. 4 persone, animali...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="btnDeleteBk" style="display:none;margin-right:auto" onclick="deleteBooking()">🗑 Elimina</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="saveBooking()">✓ Salva</button>
    </div>
  </div>
</div>

</body>
