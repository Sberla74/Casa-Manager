<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Donnamisurata — Guida Ospiti</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:"DM Sans",sans-serif; background:#fff; color:#2a2a2a; }

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* FOTO */
.photo-wrap {
  position: relative;
  width: 100%;
  height: 45vh;
  flex-shrink: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #c8dfc0 0%, #4a7c5f 55%, #2d5a3d 100%);
}
.photo-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.photo-wrap img:not([src]), .photo-wrap img[src=""] { display: none; }

/* SELETTORE LINGUA */
.lang-bar {
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  display: flex; gap: 0.4rem; z-index: 10;
}
.lang-btn {
  background: rgba(255,255,255,0.93);
  border: 2px solid transparent;
  border-radius: 100px;
  padding: 0.28rem 0.65rem;
  font-size: 0.78rem; font-weight: 600;
  cursor: pointer; color: #444;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  transition: all 0.15s;
}
.lang-btn.active { border-color: #4a7c5f; color: #4a7c5f; }

/* BANNER BENVENUTO */
#welcomeBanner {
  background: #2a2a2a;
  color: white;
  text-align: center;
  padding: 1rem 1.25rem;
  font-size: clamp(0.85rem, 3.2vw, 1rem);
  font-weight: 300;
  line-height: 1.55;
  flex-shrink: 0;
}
#welcomeBanner .alert-link {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  margin-top: 0.55rem;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 100px;
  padding: 0.32rem 0.85rem;
  font-size: 0.82rem;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* CHAT */
#chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
  min-height: 0;
  overflow: hidden;
}

#conversation {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.85rem 0.9rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.msg.user { display:flex; justify-content:flex-end; }
.msg.user .bubble {
  background: #4a7c5f; color: white;
  border-radius: 1.1rem 1.1rem 0.15rem 1.1rem;
  padding: 0.65rem 0.95rem;
  max-width: 80%; font-size: 0.9rem; line-height: 1.5;
}
.msg.bot .bubble {
  background: white; color: #2a2a2a;
  border-radius: 1.1rem 1.1rem 1.1rem 0.15rem;
  padding: 0.75rem 1rem;
  max-width: 88%; font-size: 0.9rem; line-height: 1.6;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}
.msg.bot .bubble strong { color: #4a7c5f; }
.msg.bot .bubble a { color: #4a7c5f; text-decoration: underline; }
.msg-time { font-size: 0.62rem; color: #bbb; margin-top: 0.2rem; padding: 0 0.15rem; }
.msg.user .msg-time { text-align: right; }

.typing-dots { display:flex; gap:4px; padding:0.1rem 0; }
.typing-dots span { width:7px; height:7px; background:#ccc; border-radius:50%; animation:bounce 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* INPUT */
#inputBar {
  background: white;
  border-top: 1px solid #e8e8e8;
  padding: 0.65rem 0.9rem;
  flex-shrink: 0;
}
#inputBar .inner {
  display: flex; gap: 0.5rem; align-items: center;
  max-width: 680px; margin: 0 auto;
}
#msgInput {
  flex: 1; background: #fff; border: 2px solid #4a7c5f;
  border-radius: 100px; padding: 0.7rem 1rem;
  font-family: "DM Sans",sans-serif; font-size: 0.92rem;
  color: #2a2a2a; outline: none;
}
#msgInput::placeholder { color: #666; }
#inputHint { font-size:0.75rem; font-weight:700; color:#4a7c5f; margin-bottom:0.35rem; padding:0 0.2rem; }
#sendBtn {
  background: #4a7c5f; color: white; border: none;
  border-radius: 50%; width: 2.3rem; height: 2.3rem;
  font-size: 0.95rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
#sendBtn:hover { background: #5c9470; }
#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

/* POPUP */
#alertOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
#alertOverlay.open { display: flex; }
.alert-box {
  background: white; border-radius: 1.4rem;
  padding: 1.6rem 1.4rem;
  max-width: 400px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}
.alert-box h3 {
  font-size: 1.05rem; font-weight: 600;
  text-align: center; margin-bottom: 1rem;
}
.alert-row {
  display: flex; gap: 0.65rem;
  padding: 0.85rem 0.95rem;
  border-radius: 0.9rem;
  margin-bottom: 0.65rem;
}
.alert-row.sand { background: #fff5f5; }
.alert-row.energy { background: #fffbf0; margin-bottom: 1.1rem; }
.alert-row .ico { font-size: 1.3rem; flex-shrink: 0; }
.alert-row p { font-size: 0.85rem; line-height: 1.5; color: #333; }
.alert-row p strong { display: block; margin-bottom: 0.15rem; color: #1a1a1a; }
#alertCloseBtn {
  width: 100%; background: #4a7c5f; color: white;
  border: none; border-radius: 100px; padding: 0.8rem;
  font-family: "DM Sans",sans-serif; font-size: 0.92rem;
  font-weight: 500; cursor: pointer;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg { animation: fadeUp 0.28s ease both; }
</style>
</head>

let currentLang = 'it';
let bannerConfirmed = false;

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];

  document.getElementById('btnIT').className = 'lang-btn' + (lang==='it'?' active':'');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');

  if (!bannerConfirmed) {
    const b = document.getElementById('welcomeBanner');
    b.innerHTML = t.bannerText +
      '<br><span class="alert-link" onclick="openAlert()">' + t.alertLink + '</span>';
  }

  document.getElementById('msgInput').placeholder = t.placeholder;
  document.getElementById('inputHint').textContent = lang==='it' ? '💬 Scrivi qui la tua domanda' : '💬 Write your question here';
}

function openAlert() {
  const t = T[currentLang];
  document.getElementById('alertTitle').textContent = t.alertTitle;
  document.getElementById('alertT1').textContent = t.t1;
  document.getElementById('alertB1').textContent = t.b1;
  document.getElementById('alertT2').textContent = t.t2;
  document.getElementById('alertB2').textContent = t.b2;
  document.getElementById('alertCloseBtn').textContent = t.closeBtn;
  document.getElementById('alertOverlay').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('open');
  bannerConfirmed = true;
  document.getElementById('welcomeBanner').innerHTML = T[currentLang].afterAlert;
  document.getElementById('welcomeBanner').dataset.confirmed = '1';
}

let eventiBlock = '';

async function loadEventi() {
  try {
    const snap = await db.ref('eventi_settimanali/current').once('value');
    const data = snap.val();
    if (data && data.eventi && data.eventi.length > 0) {
      const lista = data.eventi.map(e =>
        '• ' + e.data + ' — ' + e.titolo + ' (' + e.luogo + '): ' + e.descrizione
      ).join('\n');
      eventiBlock = '\n\nEVENTI QUESTA SETTIMANA (' + data.settimana + '):\n' + lista +
        '\n\nSe l\'ospite chiede di eventi, cosa si fa, cosa c\'è in zona, usa queste informazioni rispondendo in modo utile e contestuale. Se chiede di una zona specifica, filtra gli eventi pertinenti.';
    }
  } catch(e) { /* silent fail */ }
}

// ── CHAT ──────────────────────────────────────────────
let chatHistory = [];

function mdToHtml(text) {
  return text
    .replace(/[*][*](.+?)[*][*]/g, '<strong>$1</strong>')
    .replace(/[*](.+?)[*]/g, '<em>$1</em>')
    .split('\n').join('<br>');
}

function nowStr() {
  return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, html) {
  const conv = document.getElementById('conversation');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = role==='bot' ? mdToHtml(html) : html;
  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = nowStr();
  wrap.appendChild(bub);
  wrap.appendChild(t);
  conv.appendChild(wrap);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}

function showTyping() {
  const conv = document.getElementById('conversation');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  conv.appendChild(d);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}
function hideTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const text = inp.value.trim();
  if (!text) return;

  const banner = document.getElementById('welcomeBanner');
  if (banner) banner.style.display = 'none';

  inp.value = ''; btn.disabled = true;
  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  logFB('user', text);
  showTyping();

  try {
    const res = await fetch('https://trainer-ai-proxy.f-lonatica.workers.dev', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        system: SYSTEM + '\n\nDATA ODIERNA: ' + new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) + '.' + eventiBlock + '\n\nRispondi SEMPRE in ' + (currentLang === 'it' ? 'italiano' : 'English') + '.',
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Mi dispiace, non sono riuscito a rispondere. Contatta Fabrizio su WhatsApp.';
    hideTyping();
    addMsg('bot', reply);
    chatHistory.push({role:'assistant', content:reply});
    logFB('assistant', reply);
  } catch(e) {
    hideTyping();
    addMsg('bot', 'Connessione non disponibile. Contatta Fabrizio: <a href="https://wa.me/393490069083">WhatsApp</a>');
  }
  btn.disabled = false;
  inp.focus();
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

setLang('it');
