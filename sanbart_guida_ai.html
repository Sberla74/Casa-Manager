<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>San Bartolomeo Casa e Putia — Guida Ospiti</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:"DM Sans",sans-serif; background:#fff; color:#2a2a2a; }
body { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

.photo-wrap { position:relative; width:100%; height:45vh; flex-shrink:0; overflow:hidden; }
.photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }

.lang-bar { position:absolute; top:0.75rem; right:0.75rem; display:flex; gap:0.4rem; z-index:10; }
.lang-btn { background:rgba(255,255,255,0.93); border:2px solid transparent; border-radius:100px; padding:0.28rem 0.65rem; font-size:0.78rem; font-weight:600; cursor:pointer; color:#444; box-shadow:0 2px 8px rgba(0,0,0,0.18); transition:all 0.15s; }
.lang-btn.active { border-color:#8b6b4a; color:#8b6b4a; }

#welcomeBanner { background:#2a2a2a; color:white; text-align:center; padding:1rem 1.25rem; font-size:clamp(0.85rem,3.2vw,1rem); font-weight:300; line-height:1.55; flex-shrink:0; }
#welcomeBanner .alert-link { display:inline-flex; align-items:center; gap:0.35rem; margin-top:0.55rem; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35); border-radius:100px; padding:0.32rem 0.85rem; font-size:0.82rem; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }

#chatArea { flex:1; display:flex; flex-direction:column; background:#f5f5f5; min-height:0; overflow:hidden; }
#conversation { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0.85rem 0.9rem 0.5rem; display:flex; flex-direction:column; gap:0.75rem; }

.msg.user { display:flex; justify-content:flex-end; }
.msg.user .bubble { background:#8b6b4a; color:white; border-radius:1.1rem 1.1rem 0.15rem 1.1rem; padding:0.65rem 0.95rem; max-width:80%; font-size:0.9rem; line-height:1.5; }
.msg.bot .bubble { background:white; color:#2a2a2a; border-radius:1.1rem 1.1rem 1.1rem 0.15rem; padding:0.75rem 1rem; max-width:88%; font-size:0.9rem; line-height:1.6; box-shadow:0 1px 6px rgba(0,0,0,0.08); }
.msg.bot .bubble strong { color:#8b6b4a; }
.msg.bot .bubble a { color:#8b6b4a; text-decoration:underline; }
.msg-time { font-size:0.62rem; color:#bbb; margin-top:0.2rem; padding:0 0.15rem; }
.msg.user .msg-time { text-align:right; }

.typing-dots { display:flex; gap:4px; padding:0.1rem 0; }
.typing-dots span { width:7px; height:7px; background:#ccc; border-radius:50%; animation:bounce 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

#inputBar { background:white; border-top:1px solid #e8e8e8; padding:0.65rem 0.9rem; flex-shrink:0; }
#inputBar .inner { display:flex; gap:0.5rem; align-items:center; max-width:680px; margin:0 auto; }
#msgInput { flex:1; background:#f0f0f0; border:none; border-radius:100px; padding:0.7rem 1rem; font-family:"DM Sans",sans-serif; font-size:0.92rem; color:#2a2a2a; outline:none; }
#msgInput::placeholder { color:#aaa; }
#sendBtn { background:#8b6b4a; color:white; border:none; border-radius:50%; width:2.3rem; height:2.3rem; font-size:0.95rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
#sendBtn:hover { background:#b08d6a; }
#sendBtn:disabled { opacity:0.4; cursor:not-allowed; }

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg { animation:fadeUp 0.28s ease both; }
</style>
</head>

const T = {
  it: {
    bannerText: "Ciao! Sono Fabrizio, il tuo assistente virtuale.",
    afterAlert: "Perfetto, allora diamo inizio alla tua vacanza! 😊 Come posso aiutarti?",
    placeholder: "Scrivi un messaggio..."
  },
  en: {
    bannerText: "Hi! I'm Fabrizio, your virtual assistant.",
    afterAlert: "Perfect, let's start your stay! 😊 How can I help you?",
    placeholder: "Type a message..."
  }
};

let currentLang = 'it';
let bannerConfirmed = false;

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];
  document.getElementById('btnIT').className = 'lang-btn' + (lang==='it' ? ' active' : '');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en' ? ' active' : '');
  if (!bannerConfirmed) {
    document.getElementById('welcomeBanner').innerHTML = t.bannerText + '<br><em style="font-size:0.82rem;opacity:0.75;">' + (lang==='it' ? 'Come posso aiutarti?' : 'How can I help you?') + '</em>';
  }
  document.getElementById('msgInput').placeholder = t.placeholder;
}

let chatHistory = [];

function mdToHtml(text) {
  return text
    .replace(/[*][*](.+?)[*][*]/g, '<strong>$1</strong>')
    .replace(/[*](.+?)[*]/g, '<em>$1</em>')
    .split('\n').join('<br>');
}

function nowStr() {
  return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, html) {
  const conv = document.getElementById('conversation');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = role==='bot' ? mdToHtml(html) : html;
  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = nowStr();
  wrap.appendChild(bub);
  wrap.appendChild(t);
  conv.appendChild(wrap);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}

function showTyping() {
  const conv = document.getElementById('conversation');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  conv.appendChild(d);
  setTimeout(() => conv.scrollTop = conv.scrollHeight, 40);
}
function hideTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const text = inp.value.trim();
  if (!text) return;

  const banner = document.getElementById('welcomeBanner');
  if (banner) banner.style.display = 'none';
  bannerConfirmed = true;

  inp.value = ''; btn.disabled = true;
  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  logFB('user', text);
  showTyping();

  try {
    const res = await fetch('https://trainer-ai-proxy.f-lonatica.workers.dev', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM + '\n\nRispondi SEMPRE in ' + (currentLang === 'it' ? 'italiano' : 'English') + '.',
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Mi dispiace, non sono riuscito a rispondere. Contatta la reception.';
    hideTyping();
    addMsg('bot', reply);
    chatHistory.push({role:'assistant', content:reply});
    logFB('assistant', reply);
  } catch(e) {
    hideTyping();
    addMsg('bot', 'Connessione non disponibile. Contatta: <a href="https://wa.me/393938622094">WhatsApp</a>');
  }
  btn.disabled = false;
  inp.focus();
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

setLang('it');
</script>
