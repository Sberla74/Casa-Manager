<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>San Bartolomeo Casa e Putia — Guida Ospiti</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root { --sea:#8b6b4a; --sea-light:#b08d6a; --text:#2a2118; --white:#fefcfa; --radius:1.5rem; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { font-family:"DM Sans",sans-serif; color:var(--text); background:#fff; display:flex; flex-direction:column; height:100%; min-height:100vh; overflow:hidden; }
.photo-wrap { position:relative; width:100%; height:52vh; flex-shrink:0; overflow:hidden; }
.photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.lang-selector { position:absolute; top:0.85rem; right:0.85rem; display:flex; gap:0.4rem; z-index:5; }
.lang-btn { background:rgba(255,255,255,0.92); border:2px solid transparent; border-radius:100px; padding:0.3rem 0.7rem; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:"DM Sans",sans-serif; color:#2a2a2a; transition:all 0.18s; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.lang-btn.active { border-color:var(--sea); background:white; color:var(--sea); }
.lang-btn:hover { background:white; }
.chat-section { display:flex; flex-direction:column; background:#f8f8f8; flex:1; min-height:0; overflow:hidden; }
.chat-intro { background:#2a2a2a; color:white; text-align:center; padding:1rem 1.25rem; font-size:clamp(0.88rem,3.5vw,1.1rem); font-weight:300; line-height:1.5; flex-shrink:0; }
#conversation { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:1rem 1rem 0.5rem; display:flex; flex-direction:column; gap:0.85rem; min-height:0; }
#conversation:empty { display:none; flex:0; }
.msg { animation:fadeUp 0.3s ease both; }
.msg.user { display:flex; justify-content:flex-end; }
.msg.user .bubble { background:var(--sea); color:white; border-radius:1.2rem 1.2rem 0.2rem 1.2rem; padding:0.7rem 1rem; max-width:82%; font-size:0.9rem; line-height:1.5; }
.msg.bot .bubble { background:white; color:var(--text); border-radius:1.2rem 1.2rem 1.2rem 0.2rem; padding:0.85rem 1.1rem; max-width:88%; font-size:0.9rem; line-height:1.65; box-shadow:0 1px 8px rgba(0,0,0,0.08); }
.msg.bot .bubble strong { color:var(--sea); }
.msg.bot .bubble a { color:var(--sea); text-decoration:underline; }
.msg-time { font-size:0.65rem; color:#aaa; margin-top:0.25rem; padding:0 0.2rem; }
.msg.user .msg-time { text-align:right; }
.typing-dots { display:flex; gap:4px; padding:0.15rem 0; }
.typing-dots span { width:7px; height:7px; background:#ccc; border-radius:50%; animation:bounce 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
.input-bar { background:white; border-top:1px solid #eee; padding:0.75rem 1rem; flex-shrink:0; }
.input-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; gap:0.6rem; }
.input-inner input { flex:1; background:#f2f2f2; border:none; border-radius:100px; padding:0.75rem 1.1rem; font-family:"DM Sans",sans-serif; font-size:0.95rem; color:var(--text); outline:none; }
.input-inner input::placeholder { color:#aaa; }
.input-inner button { background:var(--sea); color:white; border:none; border-radius:50%; width:2.4rem; height:2.4rem; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:1rem; transition:background 0.2s,transform 0.15s; }
.input-inner button:hover { background:var(--sea-light); transform:scale(1.05); }
.input-inner button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  bubble.className = "bubble";
  bubble.innerHTML = role === "bot" ? parseMarkdown(text) : text.split("\n").join("<br>");
  const time = document.createElement("div");
  time.className = "msg-time";
  time.textContent = now();
  div.appendChild(bubble);
  div.appendChild(time);
  conv.appendChild(div);
  setTimeout(()=>{ conv.scrollTop = conv.scrollHeight; }, 50);
}

function showTyping() {
  const conv = document.getElementById("conversation");
  const div = document.createElement("div");
  div.className = "msg bot"; div.id = "typing";
  div.innerHTML = "<div class=\"bubble\"><div class=\"typing-dots\"><span></span><span></span><span></span></div></div>";
  conv.appendChild(div);
  setTimeout(()=>{ conv.scrollTop = conv.scrollHeight; }, 50);
}

function removeTyping() { const t=document.getElementById("typing"); if(t)t.remove(); }

async function sendMessage() {
  const input = document.getElementById("searchInput");
  const btn = document.getElementById("sendBtn");
  const text = input.value.trim();
  if (!text) return;
  const banner = document.getElementById("welcomeBanner");
  if (banner) banner.style.display = "none";
  input.value = "";
  btn.disabled = true;
  addMessage("user", text);
  chatHistory.push({role:"user", content:text});
  logToFirebase("user", text);
  showTyping();
  try {
    const res = await fetch("https://trainer-ai-proxy.f-lonatica.workers.dev", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:600, system:SYSTEM, messages:chatHistory })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Mi dispiace, non sono riuscito a rispondere. Contatta la reception.";
    removeTyping();
    addMessage("bot", reply);
    chatHistory.push({role:"assistant", content:reply});
    logToFirebase("assistant", reply);
  } catch(e) {
    removeTyping();
    addMessage("bot", "Connessione non disponibile. Contatta: <a href=\"https://wa.me/393938622094\">WhatsApp</a>");
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});
</script>
