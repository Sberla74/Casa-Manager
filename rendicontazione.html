<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendicontazione — Hotel San Bart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D2B4E;--navy2:#1A4A7A;--navy3:#2B6CB0;
  --gold:#C9973A;--gold2:#F0C060;
  --white:#FFF;--off:#F8FAFD;--bg:#EEF3FA;
  --text:#0D1F3C;--text2:#4A6080;--text3:#8AA0BC;
  --border:#D0DCF0;--radius:14px;
  --shadow:0 2px 16px rgba(13,43,78,.08);
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --orange:#d97706;--orange-bg:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* LOGIN */
.login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;z-index:9999}
.login.hidden{display:none}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#fff;text-align:center}
.login-logo span{color:var(--gold2)}
.login-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:-20px;text-align:center}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:28px;width:280px;text-align:center}
.pin-hint{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:20px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .2s}
.pin-dot.filled{background:var(--gold2)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.pin-key:hover{background:rgba(255,255,255,.16)}
.pin-key:active{transform:scale(.95)}
.pin-key.empty{visibility:hidden}
.pin-error{color:#f87171;font-size:12px;margin-top:10px;min-height:18px}

/* TOPBAR */
.topbar{background:var(--navy);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,43,78,.3)}
.logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff}
.logo span{color:var(--gold2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-lbl{font-size:11px;color:rgba(255,255,255,.45)}
.tb-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.tb-btn:hover{background:rgba(255,255,255,.15)}

/* LAYOUT */
.wrap{max-width:1000px;margin:0 auto;padding:24px 20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--navy);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.month-sel{padding:8px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--navy);background:var(--white);outline:none;cursor:pointer}
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--off);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.88}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* RECORDS */
.records-section{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.records-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.records-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy)}
.record-item{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--off);transition:background .15s}
.record-item:last-child{border-bottom:none}
.record-item:hover{background:var(--off)}
.record-thumb{width:48px;height:48px;border-radius:8px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.record-thumb img{width:100%;height:100%;object-fit:cover}
.record-info{flex:1;min-width:0}
.record-desc{font-weight:600;color:var(--navy);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-meta{font-size:12px;color:var(--text3);margin-top:2px}
.record-badge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-entrata{background:var(--green-bg);color:var(--green)}
.badge-costo{background:var(--red-bg);color:var(--red)}
.record-amt{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;white-space:nowrap}
.record-amt.entrata{color:var(--green)}
.record-amt.costo{color:var(--red)}
.record-actions{display:flex;gap:6px;flex-shrink:0}
.rec-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--off);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.rec-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.rec-btn.del:hover{background:var(--red);border-color:var(--red)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:30px;color:var(--text3);font-size:13px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,43,78,.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(13,43,78,.2);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy);margin-bottom:18px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--navy2);margin-bottom:5px;display:block}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--off);outline:none;transition:border .2s}
.fi:focus{border-color:var(--navy3);background:var(--white)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-acts{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.tipo-toggle{display:flex;gap:8px;margin-bottom:14px}
.tipo-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:var(--off);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center}
.tipo-btn.active-entrata{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.tipo-btn.active-costo{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* PHOTO UPLOAD */
.photo-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.photo-area:hover{border-color:var(--navy);background:var(--off)}
.photo-area.has-photo{border-color:var(--green);background:var(--green-bg)}
.photo-preview{max-width:100%;max-height:180px;border-radius:8px;display:none}
.photo-area.has-photo .photo-preview{display:block;margin:0 auto}
.photo-area.has-photo .photo-hint{display:none}
.photo-hint{font-size:13px;color:var(--text3)}
.photo-hint span{font-size:24px;display:block;margin-bottom:6px}
.photo-remove{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
.photo-area.has-photo .photo-remove{display:flex}

/* IMAGE VIEWER */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center}
.img-viewer.open{display:flex}
.img-viewer img{max-width:90vw;max-height:90vh;border-radius:12px}
.img-viewer-close{position:absolute;top:20px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:rgba(255,255,255,.2);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-logo">🏨 San Bart <span>Rendicontazione</span></div>
  <div class="login-sub">Hotel San Bartolomeo Casa e Putia</div>
  <div class="login-box">
    <div class="pin-hint">Inserisci il PIN per accedere</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key" style="font-size:14px" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">🏨 <span>Rendicontazione</span></div>
  <div class="topbar-right">
    <span class="sync-lbl" id="syncLbl"></span>
    <button class="tb-btn" onclick="exportCSV()">⬇ CSV</button>
    <button class="tb-btn" onclick="exportPDF()">⬇ PDF</button>
  </div>
</div>

<div class="wrap">
  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Entrate mese</div>
      <div class="stat-val" style="color:var(--green)" id="sEnt">€ —</div>
      <div class="stat-sub" id="sEntCount">— voci</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Costi mese</div>
      <div class="stat-val" style="color:var(--red)" id="sCosti">€ —</div>
      <div class="stat-sub" id="sCostiCount">— voci</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Utile netto</div>
      <div class="stat-val" id="sUtile">€ —</div>
      <div class="stat-sub">del mese</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Scontrini</div>
      <div class="stat-val" id="sFoto">—</div>
      <div class="stat-sub">con foto</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <select class="month-sel" id="selMonth" onchange="loadRecords()">
      <option value="01">Gennaio</option><option value="02">Febbraio</option>
      <option value="03">Marzo</option><option value="04">Aprile</option>
      <option value="05">Maggio</option><option value="06">Giugno</option>
      <option value="07">Luglio</option><option value="08">Agosto</option>
      <option value="09">Settembre</option><option value="10">Ottobre</option>
      <option value="11">Novembre</option><option value="12">Dicembre</option>
    </select>
    <button class="btn btn-primary" onclick="openAdd()">+ Aggiungi voce</button>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()">↻ Aggiorna</button>
  </div>

  <!-- RECORDS -->
  <div class="records-section">
    <div class="records-hdr">
      <div class="records-title" id="recordsTitle">Voci del mese</div>
      <div style="font-size:12px;color:var(--text3)" id="sheetLink">
        <a href="https://docs.google.com/spreadsheets/d/15jd0ABvHdSd7zuSWU4E8qMszX09Bj7mW8onQfw0w2J8/edit" target="_blank" style="color:var(--navy2);font-weight:600">📊 Apri Google Sheet</a>
      </div>
    </div>
    <div id="recordsList"><div class="loading">Caricamento...</div></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="mAdd">
  <div class="modal">
    <div class="modal-title">Aggiungi voce</div>

    <!-- Tipo toggle -->
    <div class="tipo-toggle">
      <button class="tipo-btn active-costo" id="btnCosto" onclick="setTipo('costo')">📉 Costo / Scontrino</button>
      <button class="tipo-btn" id="btnEntrata" onclick="setTipo('entrata')">📈 Entrata</button>
    </div>

    <div class="fr">
      <div class="fg">
        <label class="fl">Data *</label>
        <input class="fi" id="mData" type="date">
      </div>
      <div class="fg">
        <label class="fl">Importo € *</label>
        <input class="fi" id="mImporto" type="number" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>

    <div class="fg">
      <label class="fl">Categoria *</label>
      <select class="fi" id="mCategoria">
        <option value="">Seleziona...</option>
        <optgroup label="Costi">
          <option value="Spesa alimentare">🛒 Spesa alimentare</option>
          <option value="Colazione">☕ Colazione</option>
          <option value="Pulizie e detergenti">🧹 Pulizie e detergenti</option>
          <option value="Manutenzione">🔧 Manutenzione</option>
          <option value="Utenze">💡 Utenze</option>
          <option value="Personale">👔 Personale</option>
          <option value="Forniture">📦 Forniture</option>
          <option value="Altro costo">📌 Altro costo</option>
        </optgroup>
        <optgroup label="Entrate">
          <option value="Soggiorno">🛏 Soggiorno</option>
          <option value="Colazione extra">☕ Colazione extra</option>
          <option value="Servizi extra">✨ Servizi extra</option>
          <option value="Altra entrata">📌 Altra entrata</option>
        </optgroup>
      </select>
    </div>

    <div class="fg">
      <label class="fl">Descrizione</label>
      <input class="fi" id="mDesc" type="text" placeholder="es. Supermercato Decò, fattura n.123...">
    </div>

    <!-- Photo upload -->
    <div class="fg" id="fotoGroup">
      <label class="fl">Foto scontrino / ricevuta</label>
      <div class="photo-area" id="photoArea" onclick="document.getElementById('photoInput').click()">
        <div class="photo-hint"><span>📸</span>Tocca per fotografare o caricare</div>
        <img class="photo-preview" id="photoPreview" src="" alt="Anteprima">
        <button class="photo-remove" onclick="removePhoto(event)">✕</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)" style="display:none">
    </div>

    <div class="fg">
      <label class="fl">Note</label>
      <input class="fi" id="mNote" type="text" placeholder="Opzionale...">
    </div>

    <div class="modal-acts">
      <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">✓ Salva</button>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div class="img-viewer" id="imgViewer" onclick="closeViewer()">
  <div class="img-viewer-close">✕</div>
  <img id="viewerImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
var PIN = '2408';
var PIN_KEY = 'rend_auth';
var PIN_DAYS = 7;
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWO4n2gmN1mx_Pb4w0V_QjYfc7-VG4Z2fS-xzGThXwkXuwXDpNntFJcYYlAvQLLXII/exec';

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function euro(n){ return '€ '+parseFloat(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},2800); }
function closeModal(){ document.getElementById('mAdd').classList.remove('open'); }
function getSheetName(){
  var sel=document.getElementById('selMonth');
  var y=new Date().getFullYear();
  return sel.value+'-'+y;
}

// ══════════════════════════════════════════════
// PIN
// ══════════════════════════════════════════════
var pinEntry='';
function checkAuth(){ var s=JSON.parse(localStorage.getItem(PIN_KEY)||'null'); if(s&&Date.now()<s.expires){document.getElementById('loginScreen').classList.add('hidden');return true;}return false; }
function pinPress(d){ if(pinEntry.length>=4)return; pinEntry+=d; updateDots(); if(pinEntry.length===4)setTimeout(checkPin,200); }
function pinDel(){ pinEntry=pinEntry.slice(0,-1); updateDots(); document.getElementById('pinError').textContent=''; }
function updateDots(){ for(var i=0;i<4;i++){var dot=document.getElementById('pd'+i);if(dot)dot.classList.toggle('filled',i<pinEntry.length);} }
function checkPin(){
  if(pinEntry===PIN){
    localStorage.setItem(PIN_KEY,JSON.stringify({expires:Date.now()+PIN_DAYS*864e5}));
    document.getElementById('loginScreen').classList.add('hidden');
    init();
  } else {
    document.getElementById('pinError').textContent='PIN errato, riprova';
    pinEntry=''; updateDots();
  }
}
document.addEventListener('keydown',function(e){
  if(document.getElementById('loginScreen').classList.contains('hidden'))return;
  if(e.key>='0'&&e.key<='9')pinPress(e.key);
  if(e.key==='Backspace')pinDel();
});

// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
var records = [];
var currentTipo = 'costo';
var photoData = null;

function loadRecords(){
  var sheet = getSheetName();
  var lbl = document.getElementById('syncLbl');
  if(lbl) lbl.textContent = 'Caricamento...';
  document.getElementById('recordsList').innerHTML = '<div class="loading">Caricamento...</div>';

  fetch(SCRIPT_URL+'?action=getRecords&mese='+encodeURIComponent(sheet))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.success){
        records = d.records || [];
        renderRecords();
        if(lbl) lbl.textContent = 'Aggiornato '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      } else {
        document.getElementById('recordsList').innerHTML = '<div class="empty">Errore: '+d.error+'</div>';
      }
    })
    .catch(function(e){
      document.getElementById('recordsList').innerHTML = '<div class="empty">Errore connessione</div>';
      if(lbl) lbl.textContent = 'Errore';
    });
}

function renderRecords(){
  var entrate = records.filter(function(r){return r.tipo==='entrata';});
  var costi   = records.filter(function(r){return r.tipo==='costo';});
  var totEnt  = entrate.reduce(function(s,r){return s+(parseFloat(r.importo)||0);},0);
  var totCosti= costi.reduce(function(s,r){return s+(parseFloat(r.importo)||0);},0);
  var utile   = totEnt - totCosti;
  var conFoto = records.filter(function(r){return r.fotoUrl&&r.fotoUrl!=='';}).length;

  document.getElementById('sEnt').textContent     = euro(totEnt);
  document.getElementById('sCosti').textContent   = euro(totCosti);
  document.getElementById('sEntCount').textContent= entrate.length+' voci';
  document.getElementById('sCostiCount').textContent= costi.length+' voci';
  document.getElementById('sUtile').textContent   = euro(utile);
  document.getElementById('sUtile').style.color   = utile>=0?'var(--green)':'var(--red)';
  document.getElementById('sFoto').textContent    = conFoto;

  var months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  var m = parseInt(document.getElementById('selMonth').value)-1;
  document.getElementById('recordsTitle').textContent = months[m]+' '+new Date().getFullYear();

  if(!records.length){
    document.getElementById('recordsList').innerHTML='<div class="empty">Nessuna voce per questo mese<br><small>Clicca "+ Aggiungi voce" per iniziare</small></div>';
    return;
  }

  var sorted = records.slice().sort(function(a,b){ return String(b.data).localeCompare(String(a.data)); });
  document.getElementById('recordsList').innerHTML = sorted.map(function(r){
    var isEnt = r.tipo==='entrata';
    var fmtDate = r.data ? String(r.data).split('-').reverse().join('/') : '—';
    var thumbHtml = r.fotoUrl && r.fotoUrl!=='' ?
      '<div class="record-thumb" onclick="viewPhoto(\''+r.fotoUrl+'\')"><img src="'+r.fotoUrl+'" alt="scontrino" onerror="this.parentNode.innerHTML=\'📄\'"></div>' :
      '<div class="record-thumb">'+( isEnt?'📈':'🧾')+'</div>';

    return '<div class="record-item">'+
      thumbHtml+
      '<div class="record-info">'+
        '<div class="record-desc">'+(r.descrizione||r.categoria||'—')+'</div>'+
        '<div class="record-meta">'+fmtDate+' &nbsp;·&nbsp; '+r.categoria+'&nbsp; <span class="record-badge '+(isEnt?'badge-entrata':'badge-costo')+'">'+(isEnt?'Entrata':'Costo')+'</span>'+(r.note?' &nbsp;·&nbsp; '+r.note:'')+'</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div class="record-amt '+(isEnt?'entrata':'costo')+'">'+(isEnt?'+':'-')+euro(r.importo)+'</div>'+
      '</div>'+
      '<div class="record-actions">'+
        '<button class="rec-btn del" data-rid="'+r.id+'" onclick="deleteRecord(this)">✕</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════════
// ADD RECORD
// ══════════════════════════════════════════════
function openAdd(){
  setTipo('costo');
  document.getElementById('mData').value = new Date().toISOString().split('T')[0];
  document.getElementById('mImporto').value = '';
  document.getElementById('mCategoria').value = '';
  document.getElementById('mDesc').value = '';
  document.getElementById('mNote').value = '';
  removePhoto(null);
  document.getElementById('mAdd').classList.add('open');
  setTimeout(function(){document.getElementById('mImporto').focus();},100);
}

function setTipo(tipo){
  currentTipo = tipo;
  document.getElementById('btnCosto').className   = 'tipo-btn'+(tipo==='costo'?' active-costo':'');
  document.getElementById('btnEntrata').className = 'tipo-btn'+(tipo==='entrata'?' active-entrata':'');
  document.getElementById('fotoGroup').style.display = tipo==='costo' ? 'block' : 'none';
}

function handlePhoto(input){
  if(!input.files||!input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e){
    photoData = e.target.result;
    var preview = document.getElementById('photoPreview');
    var area = document.getElementById('photoArea');
    preview.src = photoData;
    area.classList.add('has-photo');
  };
  reader.readAsDataURL(file);
}

function removePhoto(e){
  if(e) e.stopPropagation();
  photoData = null;
  document.getElementById('photoPreview').src='';
  document.getElementById('photoArea').classList.remove('has-photo');
  document.getElementById('photoInput').value='';
}

function saveRecord(){
  var data     = document.getElementById('mData').value;
  var importo  = parseFloat(document.getElementById('mImporto').value)||0;
  var categoria= document.getElementById('mCategoria').value;
  var desc     = document.getElementById('mDesc').value.trim();
  var note     = document.getElementById('mNote').value.trim();

  if(!data)    {toast('Inserisci la data');return;}
  if(!importo) {toast('Inserisci un importo');return;}
  if(!categoria){toast('Seleziona una categoria');return;}

  var btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ Salvataggio...';
  btn.disabled = true;

  var payload = {
    action:      'addRecord',
    mese:        getSheetName(),
    id:          Date.now(),
    data:        data,
    tipo:        currentTipo,
    categoria:   categoria,
    descrizione: desc,
    importo:     importo,
    struttura:   'Hotel San Bart',
    note:        note,
    foto:        currentTipo==='costo' ? (photoData||null) : null,
    nomeFile:    'scontrino_'+Date.now()+'.jpg'
  };

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.success){
      closeModal();
      loadRecords();
      toast('✓ Voce salvata');
    } else {
      toast('Errore: '+d.error);
    }
  })
  .catch(function(){toast('Errore connessione');})
  .finally(function(){ btn.textContent='✓ Salva'; btn.disabled=false; });
}

function deleteRecord(btn){
  if(!confirm('Eliminare questa voce?'))return;
  var rid = btn.dataset.rid;
  var sheet = getSheetName();

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action:'deleteRecord', id:rid, mese:sheet})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.success){ loadRecords(); toast('Voce eliminata'); }
    else toast('Errore: '+d.error);
  })
  .catch(function(){toast('Errore connessione');});
}

  document.getElementById('viewerImg').src = url;

}
function closeViewer(){

}

// EXPORT
// ══════════════════════════════════════════════
function exportCSV(){
  if(!records.length){toast('Nessuna voce da esportare');return;}
  var months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  var m=parseInt(document.getElementById('selMonth').value)-1;
  var header='Data,Tipo,Categoria,Descrizione,Importo,Struttura,Note,Foto\n';
  var rows=records.map(function(r){
    return [r.data,r.tipo,r.categoria,r.descrizione,r.importo,r.struttura,r.note,r.fotoUrl].map(function(v){
      return '"'+(v||'').toString().replace(/"/g,'""')+'"';
    }).join(',');
  }).join('\n');
  var blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SanBart_'+months[m]+'_'+new Date().getFullYear()+'.csv';
  a.click();
  toast('✓ CSV scaricato');
}

function exportPDF(){
  if(!records.length){toast('Nessuna voce da esportare');return;}
  var months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  var m=parseInt(document.getElementById('selMonth').value)-1;
  var y=new Date().getFullYear();

  var entrate=records.filter(function(r){return r.tipo==='entrata';});
  var costi  =records.filter(function(r){return r.tipo==='costo';});
  var totEnt =entrate.reduce(function(s,r){return s+(parseFloat(r.importo)||0);},0);
  var totCosti=costi.reduce(function(s,r){return s+(parseFloat(r.importo)||0);},0);

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+
    'body{font-family:Arial,sans-serif;padding:30px;color:#0D1F3C;font-size:13px}'+
    'h1{font-size:22px;margin-bottom:4px}'+
    '.sub{color:#8AA0BC;font-size:12px;margin-bottom:24px}'+
    'table{width:100%;border-collapse:collapse;margin-bottom:20px}'+
    'th{background:#0D2B4E;color:#fff;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase}'+
    'td{padding:7px 12px;border-bottom:1px solid #EEF3FA;font-size:12px}'+
    'tr.ent td{background:#f0fdf4}'+
    'tr.cos td{background:#fff5f5}'+
    '.totals{display:flex;gap:20px;margin-top:10px}'+
    '.tot-box{padding:14px 20px;border-radius:8px;flex:1;text-align:center}'+
    '.tot-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;opacity:.7}'+
    '.tot-val{font-size:20px;font-weight:700}'+
    '</style></head><body>'+
    '<h1>Rendicontazione Hotel San Bart</h1>'+
    '<div class="sub">'+months[m]+' '+y+' &nbsp;·&nbsp; SanBartolomeo Casa e Putia</div>'+
    '<div class="totals">'+
      '<div class="tot-box" style="background:#dcfce7"><div class="tot-lbl">Entrate</div><div class="tot-val" style="color:#16a34a">€ '+totEnt.toFixed(2)+'</div></div>'+
      '<div class="tot-box" style="background:#fee2e2"><div class="tot-lbl">Costi</div><div class="tot-val" style="color:#dc2626">€ '+totCosti.toFixed(2)+'</div></div>'+
      '<div class="tot-box" style="background:#EEF3FA"><div class="tot-lbl">Utile netto</div><div class="tot-val" style="color:'+(totEnt-totCosti>=0?'#16a34a':'#dc2626')+'">€ '+(totEnt-totCosti).toFixed(2)+'</div></div>'+
    '</div>'+
    '<br>'+
    '<table><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrizione</th><th>Importo</th><th>Note</th></tr>'+
    records.slice().sort(function(a,b){return String(a.data).localeCompare(String(b.data));}).map(function(r){
      var fmtDate=r.data?String(r.data).split('-').reverse().join('/'):'—';
      return '<tr class="'+(r.tipo==='entrata'?'ent':'cos')+'">'+
        '<td>'+fmtDate+'</td>'+
        '<td>'+(r.tipo==='entrata'?'📈 Entrata':'📉 Costo')+'</td>'+
        '<td>'+r.categoria+'</td>'+
        '<td>'+(r.descrizione||'—')+'</td>'+
        '<td style="font-weight:700;color:'+(r.tipo==='entrata'?'#16a34a':'#dc2626')+'">'+(r.tipo==='entrata'?'+':'-')+'€ '+parseFloat(r.importo||0).toFixed(2)+'</td>'+
        '<td>'+(r.note||'—')+'</td>'+
      '</tr>';
    }).join('')+
    '</table></body></html>';

  var w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){w.print();},500);
  toast('✓ PDF generato');
}

  loadRecords();
}

window.addEventListener('DOMContentLoaded',function(){
