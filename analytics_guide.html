<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Guide — Casa Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

  header { background: #1a1a1a; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  header a { color: #aaa; text-decoration: none; font-size: 13px; }
  header a:hover { color: #fff; }
  header span { color: #555; }
  header h1 { font-size: 15px; font-weight: 500; flex: 1; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .prop-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .prop-tab { padding: 7px 16px; border-radius: 99px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #555; transition: all 0.15s; }
  .prop-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .prop-tab:hover:not(.active) { border-color: #999; color: #1a1a1a; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid #e0e0e0; margin-bottom: 24px; }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 500; }
  .tab:hover:not(.active) { color: #1a1a1a; }

  .panel { display: none; }
  .panel.active { display: block; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .metric { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #eee; }
  .metric-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 600; color: #1a1a1a; }
  .metric-sub { font-size: 12px; color: #aaa; margin-top: 2px; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 12px 16px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .card-header:hover { background: #f3f2ef; }
  .card-title { font-size: 13px; color: #555; }
  .card-first-q { font-size: 14px; color: #1a1a1a; font-weight: 500; margin-top: 2px; }
  .card-meta { font-size: 12px; color: #aaa; white-space: nowrap; text-align: right; }
  .card-body { display: none; padding: 0 16px; }
  .card-body.open { display: block; }

  .msg { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .msg:last-child { border-bottom: none; }
  .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-user { background: #e8f0fe; color: #1a56db; }
  .badge-ai { background: #f0fdf4; color: #16a34a; }
  .msg-ts { font-size: 11px; color: #bbb; }
  .msg-content { font-size: 14px; color: #1a1a1a; line-height: 1.5; }
  .msg-content.ai { color: #555; font-size: 13px; }

  .search-box { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; margin-bottom: 16px; outline: none; }
  .search-box:focus { border-color: #1a1a1a; }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 13px; color: #555; width: 90px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; background: #1a1a1a; border-radius: 4px; transition: width 0.4s ease; min-width: 2px; }
  .bar-fill.accent { background: #2563eb; }
  .bar-val { font-size: 13px; color: #1a1a1a; font-weight: 500; width: 28px; flex-shrink: 0; }

  .section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; margin-top: 28px; }
  .section-title:first-child { margin-top: 0; }

  .empty { text-align: center; padding: 3rem 0; color: #aaa; font-size: 14px; }
  .loading { text-align: center; padding: 3rem 0; color: #aaa; font-size: 14px; }
  .error { background: #fff5f5; border: 1px solid #fecaca; border-radius: 10px; padding: 16px; color: #b91c1c; font-size: 14px; }

  .chevron { font-size: 12px; color: #aaa; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  @media (max-width: 600px) {
    .metric-value { font-size: 22px; }
    .bar-label { width: 70px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html">← Casa Manager</a>
  <span>/</span>
  <h1>Analytics Guide AI</h1>
</header>

<div class="container">
  <div id="prop-tabs" class="prop-tabs"></div>

  <div class="tabs">
    <button class="tab active" onclick="showPanel('conv', this)">Conversazioni</button>
    <button class="tab" onclick="showPanel('stats', this)">Statistiche</button>
  </div>

  <div id="panel-conv" class="panel active"></div>
  <div id="panel-stats" class="panel"></div>
</div>

<script>
const FB_DB_URL = "https://casa-manager-24414-default-rtdb.europe-west1.firebasedatabase.app";

let allData = {};
let currentProp = null;

function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts); // works for both numeric ms and ISO string
  if (isNaN(d)) return '';
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'2-digit' })
    + ' ' + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

function getTs(m) {
  // support ts (numeric or ISO string) and timestamp (ISO string)
  if (m.ts !== undefined && m.ts !== null) {
    return typeof m.ts === 'number' ? m.ts : new Date(m.ts).getTime();
  }
  if (m.timestamp) return new Date(m.timestamp).getTime();
  return 0;
}

function getText(m) {
  // support both content and text fields
  return m.content || m.text || '';
}

function trunc(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function getSessionTs(session) {
  return Math.max(...Object.values(session).map(m => getTs(m)));
}

function sortedSessions(prop) {
  const sessions = allData[prop] || {};
  return Object.entries(sessions).sort((a, b) => getSessionTs(b[1]) - getSessionTs(a[1]));
}

function renderPropTabs() {
  const props = Object.keys(allData);
  if (!currentProp && props.length) currentProp = props[0];
  document.getElementById('prop-tabs').innerHTML = props.map(p =>
    `<div class="prop-tab ${p === currentProp ? 'active' : ''}" onclick="switchProp('${p}')">${p.replace(/_/g,' ')}</div>`
  ).join('');
}

function switchProp(p) {
  currentProp = p;
  renderPropTabs();
  renderConv();
  renderStats();
}

function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

function renderConv(filter) {
  filter = (filter || '').toLowerCase();
  const el = document.getElementById('panel-conv');
  const sessions = sortedSessions(currentProp);

  if (!sessions.length) {
    el.innerHTML = '<div class="empty">Nessuna conversazione</div>';
    return;
  }

  let html = `<input class="search-box" type="text" placeholder="Cerca nelle conversazioni..." oninput="renderConv(this.value)" value="${filter}" />`;

  let count = 0;
  sessions.forEach(([sid, session]) => {
    const msgs = Object.values(session).sort((a, b) => getTs(a) - getTs(b));
    const userMsgs = msgs.filter(m => m.role === 'user');
    const firstUser = userMsgs[0] ? getText(userMsgs[0]) : '';
    const ts = getSessionTs(session);

    if (filter && !msgs.some(m => (m.content || '').toLowerCase().includes(filter))) return;
    count++;

    const msgsHtml = msgs.map(m => {
      const isUser = m.role === 'user';
      return `<div class="msg">
        <div class="msg-meta">
          <span class="badge ${isUser ? 'badge-user' : 'badge-ai'}">${isUser ? 'Ospite' : 'Guida AI'}</span>
          <span class="msg-ts">${fmt(getTs(m))}</span>
        </div>
        <div class="msg-content ${isUser ? '' : 'ai'}">${getText(m).replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('');

    const id = 'sess-' + sid.replace(/[^a-z0-9]/gi, '');
    html += `<div class="card">
      <div class="card-header" onclick="toggleCard('${id}')">
        <div>
          <div class="card-title">${fmt(ts)} &middot; ${userMsgs.length} domande</div>
          <div class="card-first-q">${trunc(firstUser, 70)}</div>
        </div>
        <div class="card-meta">
          <div class="chevron" id="chev-${id}">▼</div>
        </div>
      </div>
      <div class="card-body" id="${id}">${msgsHtml}</div>
    </div>`;
  });

  if (!count) html += '<div class="empty">Nessun risultato per "' + filter + '"</div>';
  el.innerHTML = html;
}

function toggleCard(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function renderStats() {
  const sessions = allData[currentProp] || {};
  const sessionList = Object.values(sessions);
  const allMsgs = sessionList.flatMap(s => Object.values(s));
  const userMsgs = allMsgs.filter(m => m.role === 'user');

  const totalSessions = sessionList.length;
  const totalQ = userMsgs.length;
  const avgQ = totalSessions ? (totalQ / totalSessions).toFixed(1) : 0;

  const hourBuckets = Array(24).fill(0);
  const dayMap = {};
  allMsgs.forEach(m => {
    const mts = getTs(m);
    if (!mts) return;
    const d = new Date(mts);
    hourBuckets[d.getHours()]++;
    if (m.role === 'user') {
      const key = d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit' });
      dayMap[key] = (dayMap[key] || 0) + 1;
    }
  });

  const peakHour = hourBuckets.indexOf(Math.max(...hourBuckets));
  const peakStr = totalQ ? `${peakHour}:00–${peakHour + 1}:00` : '—';

  const stopWords = new Set(['il','la','le','lo','gli','un','una','del','della','dei','delle','che','per','con','non','come','dove','quando','sono','può','se','cosa','qual','quali','mio','mia','anche','più','già','hai','fare','vorrei','puoi','grazie','ciao','okay','ok','bene','buon','buona','buongiorno','buonasera','ho','ha','ci','al','nel','alla','sulle','degli','nelle','sulla','dal','dalla']);
  const wordFreq = {};
  userMsgs.forEach(m => {
    getText(m).toLowerCase()
      .replace(/[^a-zàèéìîòùü\s]/gi, ' ')
      .split(/\s+/)
      .filter(w => w.length > 3 && !stopWords.has(w))
      .forEach(w => { wordFreq[w] = (wordFreq[w] || 0) + 1; });
  });
  const topWords = Object.entries(wordFreq).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxWord = topWords[0]?.[1] || 1;

  const recentDays = Object.entries(dayMap).slice(-10);
  const maxDay = Math.max(...recentDays.map(d => d[1]), 1);

  const hourLabels = [];
  for (let h = 0; h < 24; h += 3) {
    hourLabels.push([`${h}:00`, hourBuckets.slice(h, h+3).reduce((a,b)=>a+b,0)]);
  }
  const maxHour = Math.max(...hourLabels.map(h => h[1]), 1);

  const el = document.getElementById('panel-stats');
  el.innerHTML = `
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Sessioni totali</div>
        <div class="metric-value">${totalSessions}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Domande totali</div>
        <div class="metric-value">${totalQ}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Domande / sessione</div>
        <div class="metric-value">${avgQ}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Ora di punta</div>
        <div class="metric-value" style="font-size:18px;margin-top:4px;">${peakStr}</div>
      </div>
    </div>

    ${topWords.length ? `
    <div class="section-title">Argomenti più richiesti</div>
    ${topWords.map(([w, n]) => `
      <div class="bar-row">
        <div class="bar-label">${w}</div>
        <div class="bar-track"><div class="bar-fill accent" style="width:${Math.round(n/maxWord*100)}%"></div></div>
        <div class="bar-val">${n}</div>
      </div>`).join('')}` : ''}

    ${recentDays.length ? `
    <div class="section-title">Domande per giorno</div>
    ${recentDays.map(([d, n]) => `
      <div class="bar-row">
        <div class="bar-label">${d}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxDay*100)}%"></div></div>
        <div class="bar-val">${n}</div>
      </div>`).join('')}` : ''}

    <div class="section-title">Attività per fascia oraria</div>
    ${hourLabels.map(([h, n]) => `
      <div class="bar-row">
        <div class="bar-label">${h}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxHour*100)}%;opacity:0.5"></div></div>
        <div class="bar-val">${n}</div>
      </div>`).join('')}
  `;
}

async function init() {
  const convEl = document.getElementById('panel-conv');
  convEl.innerHTML = '<div class="loading">Connessione a Firebase...</div>';

  try {
    const res = await fetch(`${FB_DB_URL}/guide_chat.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!data) {
      convEl.innerHTML = '<div class="empty">Nessun dato in guide_chat</div>';
      return;
    }

    allData = data;
    const props = Object.keys(allData);
    if (!props.length) {
      convEl.innerHTML = '<div class="empty">Nessuna proprietà trovata</div>';
      return;
    }

    currentProp = props[0];
    renderPropTabs();
    renderConv();
    renderStats();

  } catch(e) {
    convEl.innerHTML = `<div class="error">Errore Firebase: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
